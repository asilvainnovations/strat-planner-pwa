<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strat Planner Pro">
  <meta name="description" content="Strategic Planning Platform for Leaders Who Demand Precision and Results">
  <title>Strat Planner Pro</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="https://appimize.app/assets/apps/user_1097/images/46fe704cc227_595_1097.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Condensed:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- App Content -->
    <main>
      <div class="sidebar">
        <!-- Sidebar Content -->
      </div>
      <div class="content">
        <!-- Main Content -->
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="auth.js"></script>
  <script src="database.js"></script>
  <script src="email.js"></script>
  <script src="ws.js"></script>
  <script src="routes.js"></script>
  <script src="server.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }
  </script>

  <!-- Initialization Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initNotifications();
      initDashboard();
      simulateSync();

      // Show welcome toast
      setTimeout(() => showToast('Welcome back, Maria!', 'success'), 500);
      setTimeout(() => showToast('2 new notifications', 'info'), 1500);
    });
  </script>
</body>
</html>
