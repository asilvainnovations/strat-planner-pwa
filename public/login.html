<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign In — Strat Planner Pro</title>
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens (shared with app) ── */
    :root {
      --bg:            #0A1628;
      --surface:       #0D1F3C;
      --surface-hover: #122445;
      --border:        rgba(255,255,255,0.10);
      --border-focus:  rgba(59,130,246,0.70);
      --blue-500:      #2563EB;
      --blue-400:      #3B82F6;
      --blue-300:      #60A5FA;
      --cyan-500:      #06B6D4;
      --text-primary:  rgba(255,255,255,0.95);
      --text-secondary:rgba(255,255,255,0.55);
      --text-tertiary: rgba(255,255,255,0.35);
      --danger:        #EF4444;
      --success:       #10B981;
      --radius-md:     12px;
      --radius-lg:     16px;
      --radius-xl:     24px;
      --font-ui:       'Inter', sans-serif;
      --font-display:  'Poppins', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* ── Ambient background ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1E4D9B, transparent);
      top: -15%; left: -10%;
      animation: drift 22s ease-in-out infinite;
    }
    .orb-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #06B6D4, transparent);
      bottom: -10%; right: -8%;
      animation: drift 18s ease-in-out infinite reverse;
    }
    .grid-pattern {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%  { transform: translate(28px,-28px) scale(1.08); }
      66%  { transform: translate(-18px,18px) scale(0.94); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(13,31,60,0.82);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-xl);
      padding: 40px 40px 36px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.12);
      animation: card-in 0.45s cubic-bezier(0.34,1.4,0.64,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Header ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .logo-img {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.18);
      object-fit: cover;
    }
    .logo-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--blue-300));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: var(--blue-500);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 1px;
      align-self: flex-start;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, white 0%, var(--blue-200, #93C5FD) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* ── Tabs ── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 9px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--blue-500), #1d4ed8);
      color: white;
      box-shadow: 0 2px 10px rgba(37,99,235,0.4);
    }
    .tab-btn:hover:not(.active) { color: var(--text-primary); background: rgba(255,255,255,0.06); }

    /* ── Forms ── */
    .form { display: flex; flex-direction: column; gap: 16px; }
    .form-hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-tertiary);
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
      width: 16px; height: 16px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px 12px 40px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
    }
    input:focus {
      border-color: var(--border-focus);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.14);
    }
    input::placeholder { color: var(--text-tertiary); }
    input.error-field { border-color: var(--danger); }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 4px;
      line-height: 0;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text-secondary); }

    /* ── Error / status ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: #FCA5A5;
    }
    .error-msg.visible { display: flex; }
    .success-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: #6EE7B7;
    }
    .success-msg.visible { display: flex; }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--blue-500), #1d4ed8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-md);
      color: white;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(37,99,235,0.35),
                  inset 0 1px 0 rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--blue-400), var(--blue-500));
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.45),
                  inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
      color: var(--text-tertiary);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Password strength ── */
    .strength-wrap { display: none; gap: 4px; margin-top: 4px; }
    .strength-wrap.show { display: flex; }
    .strength-bar {
      flex: 1;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s ease;
    }
    .strength-label {
      font-size: 10px;
      font-weight: 600;
      text-align: right;
      margin-top: 3px;
      transition: color 0.3s;
    }

    /* ── Footer links ── */
    .card-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .card-footer a {
      color: var(--blue-300);
      text-decoration: none;
      transition: color 0.2s;
    }
    .card-footer a:hover { color: white; }

    /* ── Forgot password ── */
    .forgot-link {
      text-align: right;
      margin-top: -8px;
    }
    .forgot-link a {
      font-size: 12px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link a:hover { color: var(--blue-300); }

    /* ── Trust row ── */
    .trust-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .trust-item svg { opacity: 0.5; }

    /* ── Terms checkbox ── */
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--blue-400);
      cursor: pointer;
      padding: 0;
      border-radius: 4px;
    }
    .checkbox-row a { color: var(--blue-300); text-decoration: none; }
    .checkbox-row a:hover { color: white; }

    @media (max-width: 480px) {
      .card { padding: 28px 24px 24px; }
      .field-row { grid-template-columns: 1fr; gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-pattern"></div>
  </div>

  <div class="card" role="main">

    <!-- Logo -->
    <a class="logo-row" href="/">
      <img
        src="https://appimize.app/assets/apps/user_1097/images/46fe704cc227_595_1097.png"
        class="logo-img"
        alt="Strat Planner Pro"
        onerror="this.style.display='none'"
      >
      <span class="logo-name">Strat Planner Pro</span>
      <span class="logo-badge">PRO</span>
    </a>

    <div class="page-title" id="card-title">Welcome back</div>
    <div class="page-subtitle" id="card-subtitle">Sign in to your strategic planning workspace</div>

    <!-- Login / Register tabs -->
    <div class="tabs" role="tablist" aria-label="Authentication mode">
      <button
        class="tab-btn active"
        id="tab-login"
        role="tab"
        aria-selected="true"
        aria-controls="form-login"
        onclick="switchTab('login')"
      >Sign In</button>
      <button
        class="tab-btn"
        id="tab-register"
        role="tab"
        aria-selected="false"
        aria-controls="form-register"
        onclick="switchTab('register')"
      >Create Account</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <form
      id="form-login"
      class="form"
      role="tabpanel"
      aria-labelledby="tab-login"
      novalidate
      onsubmit="handleLogin(event)"
    >
      <div class="error-msg" id="login-error" role="alert" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#EF4444" stroke-width="1.5"/>
          <path d="M8 4.5v4M8 11h.01" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="login-error-text">Invalid email or password.</span>
      </div>

      <div class="field">
        <label class="field-label" for="login-email">Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2.5 6.5l7.5 5 7.5-5M2.5 5h15a1 1 0 011 1v8a1 1 0 01-1 1h-15a1 1 0 01-1-1V6a1 1 0 011-1z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input
            type="email"
            id="login-email"
            name="email"
            placeholder="you@organisation.com"
            autocomplete="email"
            required
            aria-required="true"
          >
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="login-password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="9" width="14" height="9" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 9V6a3 3 0 116 0v3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input
            type="password"
            id="login-password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
            aria-required="true"
          >
          <button type="button" class="eye-btn" onclick="togglePass('login-password', this)" aria-label="Show password">
            <svg id="eye-login-show" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 10s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z" stroke-linecap="round"/>
              <circle cx="10" cy="10" r="3" stroke-linecap="round"/>
            </svg>
            <svg id="eye-login-hide" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
              <path d="M2 2l16 16M7.5 7.5A3 3 0 0013 12M4 4.5C2.3 6 1 8 1 10s3.5 7 9 7c1.6 0 3-.4 4.2-1M8 3.2C8.6 3.1 9.3 3 10 3c5.5 0 9 7 9 7a14 14 0 01-2 3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-link">
        <a href="#" onclick="showForgotPassword(event)">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" id="login-btn">
        <span id="login-btn-text">Sign In</span>
        <span id="login-spinner" class="spinner" style="display:none" aria-hidden="true"></span>
      </button>
    </form>

    <!-- ── REGISTER FORM ── -->
    <form
      id="form-register"
      class="form form-hidden"
      role="tabpanel"
      aria-labelledby="tab-register"
      novalidate
      onsubmit="handleRegister(event)"
    >
      <div class="error-msg" id="register-error" role="alert" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#EF4444" stroke-width="1.5"/>
          <path d="M8 4.5v4M8 11h.01" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="register-error-text">Something went wrong.</span>
      </div>
      <div class="success-msg" id="register-success" role="status" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#10B981" stroke-width="1.5"/>
          <path d="M5 8l2 2 4-4" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Account created! Redirecting to your workspace…</span>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-label" for="reg-first">First name</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="7" r="3" stroke-linecap="round"/>
              <path d="M3 18c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="text" id="reg-first" name="firstName" placeholder="Maria" autocomplete="given-name" required aria-required="true">
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="reg-last">Last name</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="7" r="3" stroke-linecap="round"/>
              <path d="M3 18c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="text" id="reg-last" name="lastName" placeholder="Santos" autocomplete="family-name" required aria-required="true">
          </div>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="reg-email">Work email</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2.5 6.5l7.5 5 7.5-5M2.5 5h15a1 1 0 011 1v8a1 1 0 01-1 1h-15a1 1 0 01-1-1V6a1 1 0 011-1z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input type="email" id="reg-email" name="email" placeholder="you@organisation.com" autocomplete="email" required aria-required="true">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="reg-password">Password <span style="color:var(--text-tertiary); font-weight:400; text-transform:none; letter-spacing:0">(min 8 characters)</span></label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="9" width="14" height="9" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 9V6a3 3 0 116 0v3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input
            type="password"
            id="reg-password"
            name="password"
            placeholder="Create a strong password"
            autocomplete="new-password"
            required
            aria-required="true"
            oninput="updateStrength(this.value)"
          >
          <button type="button" class="eye-btn" onclick="togglePass('reg-password', this)" aria-label="Show password">
            <svg id="eye-reg-show" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 10s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z" stroke-linecap="round"/>
              <circle cx="10" cy="10" r="3" stroke-linecap="round"/>
            </svg>
            <svg id="eye-reg-hide" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
              <path d="M2 2l16 16M7.5 7.5A3 3 0 0013 12M4 4.5C2.3 6 1 8 1 10s3.5 7 9 7c1.6 0 3-.4 4.2-1M8 3.2C8.6 3.1 9.3 3 10 3c5.5 0 9 7 9 7a14 14 0 01-2 3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <!-- Password strength -->
        <div class="strength-wrap" id="strength-bars">
          <div class="strength-bar" id="bar-1"></div>
          <div class="strength-bar" id="bar-2"></div>
          <div class="strength-bar" id="bar-3"></div>
          <div class="strength-bar" id="bar-4"></div>
        </div>
        <div class="strength-label" id="strength-label" style="display:none"></div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="terms-agree" required aria-required="true">
        <label for="terms-agree">
          I agree to the
          <a href="https://asilvainnovations.github.io/website/terms.html" target="_blank" rel="noopener">Terms of Service</a>
          and
          <a href="https://asilvainnovations.github.io/website/privacy-policy.html" target="_blank" rel="noopener">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="submit-btn" id="register-btn">
        <span id="register-btn-text">Create Account</span>
        <span id="register-spinner" class="spinner" style="display:none" aria-hidden="true"></span>
      </button>
    </form>

    <!-- Trust badges -->
    <div class="trust-row" aria-label="Security and compliance badges">
      <div class="trust-item">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3">
          <path d="M6.5 1L2 3v4c0 2.8 2 4.7 4.5 5.5C9 11.7 11 9.8 11 7V3L6.5 1z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        SSL encrypted
      </div>
      <div class="trust-item">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3">
          <circle cx="6.5" cy="6.5" r="5.5"/>
          <path d="M4 6.5l2 2 3-3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        No credit card
      </div>
      <div class="trust-item">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3">
          <rect x="2" y="5" width="9" height="6.5" rx="1.5"/>
          <path d="M4.5 5V3.5a2 2 0 014 0V5" stroke-linecap="round"/>
        </svg>
        GDPR compliant
      </div>
    </div>

  </div><!-- /.card -->

  <script>
    const API = '/api';

    /* ── Read ?mode=register from URL ── */
    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('mode') === 'register') switchTab('register');
    })();

    /* ── Tab switching ── */
    function switchTab(mode) {
      const isLogin = mode === 'login';

      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('tab-login').setAttribute('aria-selected', isLogin);
      document.getElementById('tab-register').setAttribute('aria-selected', !isLogin);
      document.getElementById('form-login').classList.toggle('form-hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('form-hidden', isLogin);

      document.getElementById('card-title').textContent    = isLogin ? 'Welcome back'     : 'Create your account';
      document.getElementById('card-subtitle').textContent = isLogin
        ? 'Sign in to your strategic planning workspace'
        : 'Start planning with precision in under a minute';

      clearErrors();
    }

    /* ── Password visibility toggle ── */
    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      const prefix = inputId === 'login-password' ? 'eye-login' : 'eye-reg';
      document.getElementById(prefix + '-show').style.display = isHidden ? 'none' : '';
      document.getElementById(prefix + '-hide').style.display = isHidden ? '' : 'none';
    }

    /* ── Password strength ── */
    function updateStrength(val) {
      const wrap  = document.getElementById('strength-bars');
      const label = document.getElementById('strength-label');
      if (!val) { wrap.classList.remove('show'); label.style.display = 'none'; return; }

      wrap.classList.add('show');
      label.style.display = 'block';

      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) score++;

      const colours = ['#EF4444','#F59E0B','#3B82F6','#10B981'];
      const labels  = ['Too weak','Fair','Good','Strong'];
      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('bar-' + i);
        bar.style.background = i <= score ? colours[score - 1] : 'rgba(255,255,255,0.08)';
      }
      label.textContent = labels[score - 1] || '';
      label.style.color = colours[score - 1] || 'transparent';
    }

    /* ── Error helpers ── */
    function showError(formId, message) {
      const el   = document.getElementById(formId + '-error');
      const text = document.getElementById(formId + '-error-text');
      if (text) text.textContent = message;
      el.classList.add('visible');
    }
    function clearErrors() {
      ['login','register'].forEach(id => {
        const el = document.getElementById(id + '-error');
        if (el) el.classList.remove('visible');
        const s = document.getElementById(id + '-success');
        if (s) s.classList.remove('visible');
      });
    }

    /* ── Set loading state ── */
    function setLoading(formId, loading) {
      const btn  = document.getElementById(formId + '-btn');
      const text = document.getElementById(formId + '-btn-text');
      const spin = document.getElementById(formId + '-spinner');
      btn.disabled          = loading;
      text.style.opacity    = loading ? '0.6' : '1';
      spin.style.display    = loading ? 'inline-block' : 'none';
    }

    /* ── Store token & redirect ── */
    function storeTokenAndRedirect(accessToken, refreshToken) {
      /* Store in memory-accessible location. For production consider
         httpOnly cookies set by the server instead. */
      sessionStorage.setItem('spp_access_token', accessToken);
      sessionStorage.setItem('spp_refresh_token', refreshToken);

      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/app/';
      window.location.href = redirect;
    }

    /* ── LOGIN ── */
    async function handleLogin(e) {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showError('login', 'Please enter your email and password.');
        return;
      }

      setLoading('login', true);
      try {
        const res = await fetch(API + '/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError('login', data.error || 'Invalid credentials. Please try again.');
          return;
        }

        storeTokenAndRedirect(data.accessToken, data.refreshToken);

      } catch (err) {
        showError('login', 'Network error. Please check your connection and try again.');
      } finally {
        setLoading('login', false);
      }
    }

    /* ── REGISTER ── */
    async function handleRegister(e) {
      e.preventDefault();
      clearErrors();

      const firstName = document.getElementById('reg-first').value.trim();
      const lastName  = document.getElementById('reg-last').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value;
      const agreed    = document.getElementById('terms-agree').checked;

      if (!firstName || !lastName || !email || !password) {
        showError('register', 'Please fill in all fields.');
        return;
      }
      if (password.length < 8) {
        showError('register', 'Password must be at least 8 characters.');
        return;
      }
      if (!agreed) {
        showError('register', 'Please agree to the Terms of Service to continue.');
        return;
      }

      setLoading('register', true);
      try {
        const res = await fetch(API + '/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ firstName, lastName, email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError('register', data.error || 'Registration failed. Please try again.');
          return;
        }

        document.getElementById('register-success').classList.add('visible');
        setTimeout(() => storeTokenAndRedirect(data.accessToken, data.refreshToken), 1200);

      } catch (err) {
        showError('register', 'Network error. Please check your connection and try again.');
      } finally {
        setLoading('register', false);
      }
    }

    /* ── Forgot password ── */
    function showForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const prompt = email
        ? `Send a password reset link to ${email}?`
        : 'Enter your email address in the field above, then click here again.';

      if (!email) { showError('login', prompt); return; }

      if (confirm(prompt)) {
        fetch(API + '/auth/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        })
        .then(r => r.json())
        .then(() => {
          clearErrors();
          const s = document.createElement('div');
          s.className = 'success-msg visible';
          s.style.cssText = 'margin-bottom:0';
          s.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" stroke="#10B981" stroke-width="1.5"/>
              <path d="M5 8l2 2 4-4" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Reset link sent to ${email}. Check your inbox.</span>`;
          document.getElementById('form-login').prepend(s);
        })
        .catch(() => showError('login', 'Failed to send reset link. Please try again.'));
      }
    }
  </script>
</body>
</html>
