# ============================================================
# STRAT PLANNER PRO — NGINX CONFIGURATION
# File location: /etc/nginx/sites-available/stratplannerpro.app
#
# Symlink to enable:
#   ln -s /etc/nginx/sites-available/stratplannerpro.app \
#         /etc/nginx/sites-enabled/
#
# Obtain SSL certificate (Let's Encrypt):
#   certbot --nginx -d stratplannerpro.app -d www.stratplannerpro.app
#
# Test config:    nginx -t
# Reload config:  nginx -s reload
#
# Architecture:
#   Internet → Nginx (443) → localhost:4000 (Express)
#
# Nginx handles:
#   - TLS termination
#   - HTTP → HTTPS redirect
#   - www → apex redirect
#   - Security headers (CSP, HSTS, etc.)
#   - Gzip compression
#   - WebSocket upgrade for /ws
#   - Static asset caching (CSS, JS, icons)
#   - Rate limiting
# ============================================================

# ── Rate limit zones ─────────────────────────────────────────
# Applied per client IP. Must be in http{} context (top-level).
# If using this as a site config include, move these two lines
# to your nginx.conf http{} block.
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name stratplannerpro.app www.stratplannerpro.app;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://stratplannerpro.app$request_uri;
    }
}

# ── www → apex redirect ──────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.stratplannerpro.app;

    ssl_certificate     /etc/letsencrypt/live/stratplannerpro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stratplannerpro.app/privkey.pem;

    return 301 https://stratplannerpro.app$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name stratplannerpro.app;

    # ── TLS configuration ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/stratplannerpro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stratplannerpro.app/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;

    # Modern TLS config (Mozilla Intermediate compatibility)
    ssl_protocols               TLSv1.2 TLSv1.3;
    ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers   off;
    ssl_stapling                on;
    ssl_stapling_verify         on;

    # ── Security headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # Content Security Policy
    # Adjust script-src and connect-src as integrations are added
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        img-src     'self' data: https://appimize.app;
        connect-src 'self' wss://stratplannerpro.app;
        worker-src  'self';
        manifest-src 'self';
        frame-ancestors 'none';
    " always;

    # ── Compression ────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json
                      application/javascript text/javascript
                      application/x-javascript text/xml
                      application/xml application/rss+xml
                      application/atom+xml image/svg+xml;

    # ── Logging ────────────────────────────────────────────
    access_log /var/log/nginx/stratplannerpro.access.log combined;
    error_log  /var/log/nginx/stratplannerpro.error.log warn;

    # ── Static asset caching ───────────────────────────────
    # Long-lived cache for versioned assets (icons, fonts, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # CSS and JS — 1 day cache
    location ~* \.(css|js)$ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            1d;
        add_header         Cache-Control "public";
    }

    # Service worker — no-cache so updates are picked up immediately
    location = /sw.js {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "no-cache, no-store, must-revalidate";
        add_header         Service-Worker-Allowed "/";
    }

    # Manifest — short cache, browsers re-check frequently
    location = /manifest.json {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            1h;
    }

    # ── Rate-limited auth endpoints ────────────────────────
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API routes ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # ── WebSocket upgrade ─────────────────────────────────
    # Critical: must use HTTP/1.1 and pass Upgrade + Connection headers
    location /ws {
        proxy_pass         http://127.0.0.1:4000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # keep connection alive for up to 1 hour
        proxy_send_timeout 3600s;
    }

    # ── File uploads ───────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            7d;
    }

    # ── All other requests (app pages + landing page) ─────
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }
}
